# Redis configuration for CryptoTrader AI

# Persistence
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec

# Memory
maxmemory 512mb
maxmemory-policy allkeys-lru

# Security (set password via env or override)
# requirepass your_redis_password

# Logging
loglevel notice

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128
