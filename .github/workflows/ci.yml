name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"
        enable-cache: true

    - name: Install dependencies
      run: |
        cd backend
        uv sync --extra dev

    - name: Lint and Format Checks
      run: |
        cd backend
        uv run ruff format --check .
        uv run ruff check .

    - name: Run Test Suite
      run: |
        cd backend
        uv run pytest tests/
